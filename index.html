<!DOCTYPE html>
<html lang="es">

<!-- TO-DOs:

  y desactivará las respuestas una vez pulsado el botón Comprobar (este bien o mal).

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoQuiz - Prácticas Gamificadas</title>
  <link rel="icon" href="GoQuiz.png" type="image/png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="./styles.css"/>
</head>

<body>
  <div id="menubar">
    <h2>GoQuiz</h2>

    <input type="file" id="jsonFile" accept=".json" style="display: none" />

    <button id="cargarJSONBtn" onclick="document.getElementById('jsonFile').click()">Cargar preguntas</button>
    <button id="resetAllBtn">RESET-ALL</button>
    <!-- <button id="newRoundBtn">NEW ROUND</button> -->
    <div class="marcador">
      ✅ <span id="aciertos">0</span> / ❌ <span id="errores">0</span>
    </div>
    <button id="toggleThemeBtn">🌙</button>
  </div>

  <p id="mensajeJSON"><br>Selecciona tu archivo JSON para cargar las preguntas.</p>

  <div id="contenido"></div>

  <script>
    // Registro del Service Worker PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then(reg => console.log('Service Worker registrado', reg))
          .catch(err => console.error('Error SW', err));
      });
    }

    // IndexedDB setup
    let db;
    const DB_NAME = 'GoQuizDB';
    const STORE_NAME = 'JSONs';
    const STORE_STATE = 'Estados';
    const KEY_LAST = 'ultimoJSON';
    const STORE_META = 'AppMeta';

    function openDB() {
      return new Promise((resolve, reject) => {
        console.log("Abrien DB con version 5");
        const request = indexedDB.open(DB_NAME, 5);
        request.onupgradeneeded = (e) => {
          db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME);
          }
          if (!db.objectStoreNames.contains(STORE_STATE)) {
            db.createObjectStore(STORE_STATE);
          }
          if (!db.objectStoreNames.contains(STORE_META)) {
            db.createObjectStore(STORE_META);
          }
        };
        request.onsuccess = (e) => {
          db = e.target.result;
          resolve(db);
        };
        request.onerror = (e) => {
          console.error("Error abriendo IndexedDB:", e);
          reject(e);
        };
        request.onblocked = () => {
          console.warn("IndexedDB bloqueada, cierre otras pestañas de esta app.");
        };
      });
    }

    // Guarda un valor en AppMeta
    function saveMeta(key, value) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_META, 'readwrite');
        const store = tx.objectStore(STORE_META);
        const req = store.put(value, key);

        req.onsuccess = () => resolve();
        req.onerror = e => reject(e);
      });
    }

    
    // Lee un valor de AppMeta
    function getMeta(key) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_META, 'readonly');
        const store = tx.objectStore(STORE_META);
        const req = store.get(key);

        req.onsuccess = () => resolve(req.result);
        req.onerror = e => reject(e);
      });
    }

    function salvarPreguntas(key, data) {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).put(data, key);
    }

    function getPreguntas(key) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readonly");
        const req = tx.objectStore(STORE_NAME).get(key);
        req.onsuccess = () => resolve(req.result);
        req.onerror = e => reject(e);
      });
    }

    function salvarEstado(key, estado) {
      const tx = db.transaction(STORE_STATE, 'readwrite');
      tx.objectStore(STORE_STATE).put(estado, key);
    }

    function getEstado(key) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_STATE, "readonly");
        const req = tx.objectStore(STORE_STATE).get(key);
        req.onsuccess = () => resolve(req.result);
        req.onerror = e => reject(e);
      });
    }

    /* Estado global */
    let aciertos = 0;
    let errores = 0;
    let usados = {};
    let jsonKey = null;

    const aciertosSpan = document.getElementById("aciertos");
    const erroresSpan = document.getElementById("errores");
    const contenidoDiv = document.getElementById("contenido");
    const mensajeJSON = document.getElementById("mensajeJSON");
    const jsonInput = document.getElementById("jsonFile");
    const toggleThemeBtn = document.getElementById("toggleThemeBtn");
    const resetAllBtn = document.getElementById("resetAllBtn");
    resetAllBtn.addEventListener("click", resetAll);

    async function setTheme(theme) {
      document.body.classList.toggle("dark", theme === "dark");
      toggleThemeBtn.textContent = theme === "dark" ? "☀️" : "🌙";

      await saveMeta("theme", theme);
    }

    toggleThemeBtn.addEventListener("click", async () => {
      const newTheme = document.body.classList.contains("dark") ? "light" : "dark";
      await setTheme(newTheme);
    });

    // Cargar tema al iniciar la app
    async function loadTheme() {
      const theme = await getMeta("theme");
      setTheme(theme || "light");
    }

    function cargarPreguntas(data) {
      contenidoDiv.innerHTML = "";
      mensajeJSON.style.display = "none";

      for (const seccion in data) {
        const sec = document.createElement("section");
        const h3 = document.createElement("h3");
        h3.textContent = seccion;
        sec.appendChild(h3);

        const pregs = data[seccion];
        for (let i = 0; i < pregs.length; i++) {
          const p = pregs[i];
          const qid = seccion + "-" + i;
          const estadoPrevio = usados[qid];

          const card = document.createElement("div");
          card.className = "pregunta";

          const preguntaP = document.createElement("p");
          preguntaP.textContent = p.texto;
          card.appendChild(preguntaP);

          for (let j = 0; j < p.opciones.length; j++) {
            const opt = p.opciones[j];
            const label = document.createElement("label");
            const input = document.createElement("input");
            input.type = "radio";
            input.name = qid;
            input.value = opt;
            if (estadoPrevio) {
              if (estadoPrevio.seleccion === opt) input.checked = true;
              if (estadoPrevio.estado === "correcto") input.disabled = true;
            }
            label.className = "opcion";
            label.appendChild(input);
            label.append(" " + opt);
            card.appendChild(label);
            card.appendChild(document.createElement("br"));
          }

          const btnDiv = document.createElement("div");
          btnDiv.className = "pregunta-buttons-container";
          const comprobarBtn = document.createElement("button");
          comprobarBtn.textContent = "Comprobar";
          comprobarBtn.addEventListener("click", () =>
            verificar(qid, p.respuesta, p.referencia, p.explicacion)
          );
          btnDiv.appendChild(comprobarBtn);
          card.appendChild(btnDiv);

          const resDiv = document.createElement("div");
          resDiv.id = "res-" + qid;
          resDiv.style.marginTop = "8px";
          if (estadoPrevio) {
            if (estadoPrevio.estado === "correcto") {
              resDiv.textContent = "✔ Correcto";
              resDiv.style.color = "green";
            }
            if (estadoPrevio.estado === "incorrecto") {
              resDiv.textContent = "✘ Incorrecto";
              resDiv.style.color = "red";
            }
          }
          card.appendChild(resDiv);

          if (p.referencia || p.explicacion) {
            const cortinilla = document.createElement("div");
            const toggleBtn = document.createElement("button");
            toggleBtn.textContent = "Ver detalles";
            toggleBtn.addEventListener("click", () => toggleCortinilla(qid));
            cortinilla.appendChild(toggleBtn);

            const cortContent = document.createElement("div");
            cortContent.id = "cort-" + qid;
            cortContent.className = "cortinilla-content";
            if (estadoPrevio && estadoPrevio.estado === "correcto") cortContent.style.display = "block";
            if (p.referencia) {
              const refP = document.createElement("p");
              refP.textContent = "Referencia: " + p.referencia;
              cortContent.appendChild(refP);
            }
            if (p.explicacion) {
              const expP = document.createElement("p");
              expP.textContent = "Explicación: " + p.explicacion;
              cortContent.appendChild(expP);
            }
            cortinilla.appendChild(cortContent);
            card.appendChild(cortinilla);
          }

          sec.appendChild(card);
        }

        contenidoDiv.appendChild(sec);
      }
    }

    function verificar(qid, correcta) {
      const sel = document.querySelector(`input[name="${qid}"]:checked`);
      const resDiv = document.getElementById("res-" + qid);
      if (!sel) {
        resDiv.innerHTML = '<span class="incorrecto">Selecciona una opción</span>';
        return;
      }
      const seleccion = unescapeHtml(sel.value);
      const prev = usados[qid];

      if (prev && prev.estado === "correcto") {
        resDiv.innerHTML = '<span class="correcto">✔ Correcto</span>';
        return;
      }

      if (seleccion === correcta) {
        if (prev && prev.estado === "incorrecto") {
          errores = Math.max(0, errores - 1);
          aciertos++;
        } else
          if (!prev)
            aciertos++;
        usados[qid] = { estado: "correcto", seleccion };
        resDiv.innerHTML = '<span class="correcto">✔ Correcto</span>';
        document.getElementsByName(qid).forEach(inp => inp.disabled = true);
      } else {
        if (!prev)
          errores++, usados[qid] = { estado: "incorrecto", seleccion };
        else
          if (prev.estado === "incorrecto")
            usados[qid].seleccion = seleccion;
          else
            usados[qid] = { estado: "incorrecto", seleccion };
        resDiv.innerHTML = '<span class="incorrecto">✘ Incorrecto</span>';
      }
      aciertosSpan.textContent = aciertos;
      erroresSpan.textContent = errores;
      salvarEstado(jsonKey, { aciertos, errores, usados });
      // guardarEstado();
    }

    function toggleCortinilla(qid) {
      const cort = document.getElementById("cort-" + qid);
      if (!cort) return;
      cort.style.display = (cort.style.display === "none" || cort.style.display === "") ? "block" : "none";
    }

    async function resetAll() {
      try {
        usados = {};
        aciertos = 0;
        errores = 0;
        aciertosSpan.textContent = aciertos;
        erroresSpan.textContent = errores;

        if (!jsonKey) {
          console.warn("No hay JSON cargado para resetear.");
          return;
        }

        await salvarEstado(jsonKey, { aciertos, errores, usados });
        const preguntas = await getPreguntas(jsonKey);
        if (!preguntas) {
          console.warn("No se encontraron las preguntas en IndexedDB.");
          return;
        }
        cargarPreguntas(preguntas);
      } catch (err) {
        console.error("Error en resetAll:", err);
      }
    }

    // Carga manual con input file
    jsonInput.addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;

      jsonKey = file.name.trim();

      const text = await file.text();
      const data = JSON.parse(text);

      // usados = {};
      // aciertos = 0;
      // errores = 0;  

      await openDB();

      await salvarPreguntas(jsonKey, data);
      await saveMeta(KEY_LAST, jsonKey);

      const estado = await getEstado(jsonKey);
      if (estado) {
        aciertos = estado.aciertos || 0;
        errores = estado.errores || 0;
        usados = estado.usados || {};
      } else {
        aciertos = 0;
        errores = 0;
        usados = {};
      }

      aciertosSpan.textContent = aciertos;
      erroresSpan.textContent = errores;

      cargarPreguntas(data);
    });

    // Inicialización al cargar la app
    window.addEventListener('load', async () => {
      try {
        await openDB();

        const ultimoJSON = await getMeta(KEY_LAST);
        if (!ultimoJSON) {
          console.log("No hay último JSON guardado.");
          return;
        }

        jsonKey = ultimoJSON.trim();
        const preguntas = await getPreguntas(jsonKey);
        const estado = await getEstado(jsonKey);

        if (!estado) {
          console.warn("No hay estado guardado para:", ultimoJSON);
          return;
        }

        if (!preguntas) {
          console.warn("No hay preguntas guardadas para:", ultimoJSON);
          return;
        }

        aciertos = estado.aciertos || 0;
        errores = estado.errores || 0;
        usados = estado.usados || {};
        aciertosSpan.textContent = aciertos;
        erroresSpan.textContent = errores;

        await loadTheme();
        cargarPreguntas(preguntas);

      } catch (err) {
        console.error("Error al cargar el último JSON en onload:", err);
      }
    });

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        salvarEstado(jsonKey, { aciertos, errores, usados });
      }
    });

    function escapeHtml(str) { if (typeof str !== 'string') return str; return str.replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#39;"); }
    function unescapeHtml(str) { if (typeof str !== 'string') return str; return str.replaceAll("&amp;", "&").replaceAll("&lt;", "<").replaceAll("&gt;", ">").replaceAll("&quot;", '"').replaceAll("&#39;", "'"); }
  </script>
</body>

</html>
